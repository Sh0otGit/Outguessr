name = "outguessr"
main = "src/index.js"
compatibility_date = "2026-07-15"

# Static site (game + admin) — everything in public/ is served as-is.
# /api/* always goes through the Worker first, even if a same-named
# static file existed, so the API can never be shadowed by an asset.
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/api/*"]

# D1 — created by hand (see README-DEPLOY.md), database_id filled in
# after `wrangler d1 create outguessr-db`.
[[d1_databases]]
binding = "DB"
database_name = "outguessr-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

# Daily tally — fires at 00:00 UTC, tallies the day that just closed.
[triggers]
crons = ["0 0 * * *"]
