name = "outguessr"
main = "src/index.js"
compatibility_date = "2026-07-15"

[observability]
enabled = true

# Static site (game + admin) — everything in public/ is served as-is.
# /api/* always goes through the Worker first, even if a same-named
# static file existed, so the API can never be shadowed by an asset.
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/api/*"]

# D1 — created by hand (see DEPLOY.md).
[[d1_databases]]
binding = "DB"
database_name = "outguessr-db"
database_id = "0e6b08e0-8889-4c4f-9018-b380499548e1"

# Daily tally — fires at 00:03 UTC (a few minutes of slack past
# midnight, so a submit in flight at 23:59:59 doesn't get missed by a
# cron that fires at exactly the close instant; the admin's re-run-
# tally button covers any remaining edge case) — tallies the day that
# just closed.
[triggers]
crons = ["3 0 * * *"]
